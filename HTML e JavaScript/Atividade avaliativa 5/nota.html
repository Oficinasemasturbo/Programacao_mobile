<html>

<head>
    <title>Notas</title>
</head>

<body>
    <input type="text" id="N1">
    <input type="text" id="N2">
    <button onclick="media()">Tirar Média</button>

    <script>
        function media() {
            let N1 = Number(document.getElementById("N1").value);
            let N2 = Number(document.getElementById("N2").value);

            let soma = N1 + N2;
            let media = soma / 2;

            if (media >= 7) {
                alert("A média é: " + media + " - Aprovado");
            } else if (media >= 5 & media < 7) {
                alert("A média é: " + media + " - Recuperação");
            } else {
                alert("A média é: " + media + " - Reprovado");
            }
        }
    </script>

</body>

</html>
